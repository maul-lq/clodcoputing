<VirtualHost *:80>
      ServerName IP-ATAU-DOMAIN-KAMU
      DocumentRoot /var/www/htdocs

      <Directory /var/www/htdocs>
          AllowOverride All
          Require all granted
      </Directory>

      ErrorLog ${APACHE_LOG_DIR}/htdocs-error.log
      CustomLog ${APACHE_LOG_DIR}/htdocs-access.log combined
</VirtualHost>